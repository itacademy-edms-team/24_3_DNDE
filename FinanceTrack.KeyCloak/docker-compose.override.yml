services:
  keycloak-db:
    environment:
      POSTGRES_DB: ${KC_DB_NAME}
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - FinanceTrack_keycloak_db_data:/var/lib/postgresql/data
    ports:
      - "${KC_DB_PORT_EXTERNAL}:${KC_DB_PORT_INTERNAL}"
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}

      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: auth.ft.localhost
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "${KC_PUBLIC_PORT}:${KC_HTTP_PORT}"
    volumes:
      - FinanceTrack_keycloak_data:/opt/keycloak/data
      - ./exports:/temp/exports
    networks:
      default:
      finance_track_network:
        aliases:
          - auth.ft.localhost

volumes:
  FinanceTrack_keycloak_db_data:
    name: financetrack-keycloak-dev_FinanceTrack_keycloak_db_data
    external: true
  FinanceTrack_keycloak_data:
    name: financetrack-keycloak-dev_FinanceTrack_keycloak_data
    external: true

networks:
  finance_track_network:
    external: true