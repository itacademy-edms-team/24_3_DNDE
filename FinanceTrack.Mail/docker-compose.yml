name: financetrack-mail-dev


services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: FinanceTrack-mailpit
    restart: unless-stopped
    ports:
      - "16010:1025"
      - "16011:8025"
    networks:
      - default
      - finance_track_network


networks:
  finance_track_network:
    external: true